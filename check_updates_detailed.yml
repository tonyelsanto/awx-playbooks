---
- name: Check updates detailed
  hosts: all
  become: true
  gather_facts: true

  tasks:

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600
      changed_when: false

    - name: Get upgradable packages
      ansible.builtin.command: apt list --upgradable
      register: apt_updates
      changed_when: false
      failed_when: false

    - name: Build package list
      ansible.builtin.set_fact:
        upgradable_packages: "{{ apt_updates.stdout_lines[1:] }}"

    - name: Count packages
      ansible.builtin.set_fact:
        updates_count: "{{ upgradable_packages | length }}"

    - name: Show result
      ansible.builtin.debug:
        msg:
          - "Updates available: {{ updates_count }}"
          - "{{ upgradable_packages }}"
